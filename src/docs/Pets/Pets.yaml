paths:
  /api/pets:
    get:
      summary: Obtiene todas las mascotas.
      tags:
        - Pets
      responses:
        "200":
          description: Lista de mascotas obtenida exitosamente.
        "500":
          description: Error interno del servidor.
    post:
      summary: Crea una nueva mascota.
      tags:
        - Pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                specie:
                  type: string
                birthDate:
                  type: string
                  format: date
                  example: "2022-01-01"
      responses:
        "200":
          description: Mascota creada exitosamente.
